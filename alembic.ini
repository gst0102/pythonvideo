# Alembic 数据库迁移配置文件
# 运行命令示例:
#   alembic revision --autogenerate -m "init tables"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
script_location = migrations
prepend_sys_path = .

# 使用环境变量 DATABASE_URL（异步驱动）
sqlalchemy.url = postgresql+asyncpg://postgres:w12345@127.0.0.1:5432/myproject

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
