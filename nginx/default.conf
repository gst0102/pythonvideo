# api.lifelove.top HTTP → HTTPS 重定向
server {
    listen 80;
    server_name api.lifelove.top;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    
    location / {
        return 301 https://$server_name$request_uri;
    }
}

# api.lifelove.top HTTPS
server {
    listen 443 ssl http2;
    server_name api.lifelove.top;
    
    ssl_certificate /etc/letsencrypt/live/api.lifelove.top/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.lifelove.top/privkey.pem;
    
    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
}

# admin.lifelove.top HTTP（不需要 HTTPS）
server {
    listen 80;
    server_name admin.lifelove.top;
    
    location /api/ {
        proxy_pass http://app:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_buffering off;
        proxy_request_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }
    
    location / {
        proxy_pass http://81.70.84.35:8081;
        proxy_set_header Host $host;
    }
}
