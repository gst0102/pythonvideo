services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-service-app
    expose:
      - "8000"
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - IP=${DOMAIN:-0.0.0.0}
      - PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-*}
    volumes:
      # 挂载整个项目目录（方便代码实时更新）
      - ./:/app
      # 排除 Python 缓存目录（避免宿主机和容器冲突）
      - /app/__pycache__
      # 排除虚拟环境（容器内自己的依赖不要被覆盖）
      - /app/.venv
      # 保留原有的挂载配置（数据持久化）
      - ./image:/app/image
      - ./downloads:/app/downloads
      - ./logs:/app/logs
      - ./certs:/app/certs:ro
      - ./cookies.txt:/app/cookies.txt:ro
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: video-service-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - ./www/certbot:/var/www/certbot:ro
      - ./image:/usr/share/nginx/html/image:ro
    depends_on:
      - app
    restart: unless-stopped
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: video-service-certbot
    volumes:
      - ./nginx/ssl:/etc/letsencrypt
      - ./www/certbot:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do sleep 12h & wait $${!}; certbot renew --webroot -w /var/www/certbot --quiet; done;'"
    restart: unless-stopped
    networks:
      - app-network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "2"

  redis:
    image: redis:7-alpine
    container_name: video-service-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 6
    restart: unless-stopped
    networks:
      - app-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  redis_data:
    driver: local

networks:
  app-network:
    driver: bridge
